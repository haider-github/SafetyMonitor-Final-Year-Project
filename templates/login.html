<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Safety Monitor — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-box {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }
    .logo h4 {
      color: #ffc107;
      font-weight: 700;
      margin: 0;
      font-size: 1.2rem;
    }
    .logo p {
      color: #aaa;
      font-size: 0.85rem;
      margin: 4px 0 0;
    }
    .form-label { color: #ccc; font-size: 0.85rem; margin-bottom: 6px; }
    .form-control {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      color: #eee;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
    }
    .form-control:focus {
      background: #0f1117;
      border-color: #ffc107;
      color: #eee;
      box-shadow: 0 0 0 3px rgba(255,193,7,0.15);
    }
    .btn-login {
      background: #ffc107;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-weight: 700;
      font-size: 1rem;
      width: 100%;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #ffca2c; }
    .error-msg {
      background: #2a1a1a;
      border: 1px solid #dc3545;
      border-radius: 8px;
      color: #ff6b6b;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: center;
    }
    .footer-text {
      text-align: center;
      color: #555;
      font-size: 0.75rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <span class="logo-icon">⚠️</span>
    <h4>Safety Monitor</h4>
    <p>Workplace Violation Detection System</p>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control"
             placeholder="Enter username" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control"
             placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn-login">Login as Supervisor</button>
  </form>

  <div class="footer-text">
    FYP Project — Muhammad Usman Mubeen & Syed Haider Ali
  </div>
</div>
</body>
</html>
